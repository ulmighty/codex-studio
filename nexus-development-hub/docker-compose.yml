version: '3.8'

x-common-variables: &common-variables
  NODE_ENV: production
  TZ: UTC
  LOG_LEVEL: info

services:
  # Frontend Service
  frontend:
    build:
      context: ./services/frontend
      target: runner
    ports:
      - "3000:3000"
    environment:
      <<: *common-variables
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8001
    networks:
      - nexus-network
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway
  gateway:
    build:
      context: ./services/gateway
      target: runner
    ports:
      - "8000:8000"
    environment:
      <<: *common-variables
      PORT: 8000
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      PROJECTS_SERVICE_URL: http://projects:8002
      RENDERING_SERVICE_URL: http://rendering:8003
      AI_SERVICE_URL: http://ai:8004
    networks:
      - nexus-network
    depends_on:
      redis:
        condition: service_healthy
      projects:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Projects Service
  projects:
    build:
      context: ./services/projects
      target: runner
    environment:
      <<: *common-variables
      PORT: 8002
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    networks:
      - nexus-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Rendering Service
  rendering:
    build:
      context: ./services/rendering
      target: runner
    environment:
      <<: *common-variables
      PORT: 8003
      REDIS_URL: redis://redis:6379
    networks:
      - nexus-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Realtime Service
  realtime:
    build:
      context: ./services/realtime
      target: runner
    ports:
      - "8001:8001"
    environment:
      <<: *common-variables
      PORT: 8001
      REDIS_URL: redis://redis:6379
    networks:
      - nexus-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # AI Service
  ai:
    build:
      context: ./services/ai
      target: runner
    environment:
      <<: *common-variables
      PORT: 8004
      OLLAMA_BASE_URL: http://ollama:11434
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      REDIS_URL: redis://redis:6379
    networks:
      - nexus-network
    depends_on:
      ollama:
        condition: service_healthy
      chroma:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Ollama Service
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - nexus-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./data/migrations:/docker-entrypoint-initdb.d
    networks:
      - nexus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - nexus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ChromaDB
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8005:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/data
    volumes:
      - chroma-data:/chroma/data
    networks:
      - nexus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  nexus-network:
    driver: bridge
    name: nexus-network

volumes:
  postgres-data:
    name: nexus-postgres-data
  redis-data:
    name: nexus-redis-data
  chroma-data:
    name: nexus-chroma-data
  ollama-data:
    name: nexus-ollama-data
