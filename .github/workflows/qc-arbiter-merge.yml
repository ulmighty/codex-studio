name: QC Arbiter — Queue Approved PRs

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  queue-or-automerge:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'qc:approved')
    runs-on: ubuntu-latest
    steps:
      - name: Ensure gh CLI
        run: gh --version || (type -p curl && sudo apt-get update && sudo apt-get install -y gh)
      - name: Add PR to merge queue (or enable auto-merge)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_URL="${{ github.event.pull_request.html_url }}"
          else
            echo "No PR context (manual run). Exiting."; exit 0
          fi
          # For protected branches with merge queue: this puts the PR in the queue.
          # If checks aren't done yet, gh will set auto-merge and the PR merges when all requirements pass.
          gh pr merge --squash --auto "$PR_URL"
