name: CI Windows

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r project-aura/requirements.txt -c project-aura/constraints.txt
          pip install ruff mypy pytest
      - name: Lint
        run: ruff project-aura
      - name: Type check
        run: mypy project-aura/aura
      - name: Tests
        run: pytest
        working-directory: project-aura
